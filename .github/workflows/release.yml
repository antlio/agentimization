name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # build in dependency order. each package's prepublishOnly will rebuild
      # itself anyway but we still warm the dist so cross-workspace bundling
      # in tsup can resolve @agentimization/* on disk.
      - name: Build shared
        run: cd packages/shared && bunx tsc

      - name: Build core
        run: cd packages/core && bunx tsup

      - name: Build cli
        run: cd apps/cli && bunx tsup

      # bun's workspace install copies file: deps into each package's
      # node_modules. those copies are stale until we re-install, so refresh
      # them now that all the dist directories exist.
      - run: bun install --frozen-lockfile

      - name: Create release pull request or publish
        uses: changesets/action@v1
        with:
          publish: bunx changeset publish
          version: bunx changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
